version: "3.9"

services:
  api:
    build: .
    image: clincore-api:latest
    container_name: clincore_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REPERTORY_DB_PATH=/app/src/clincore/mcare_engine/data/synthesis.db
      - SECRET_KEY=${SECRET_KEY}
      - BOOTSTRAP_TOKEN=${BOOTSTRAP_TOKEN}
      - APP_ENV=production
      - DEBUG=false
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - clincore_net

networks:
  clincore_net:
    driver: bridge
